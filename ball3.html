<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بازی توپ گرانشی - لول از فایل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        .game-container {
            background: #0a1f12;
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            margin: 0 auto;
            background-color: #1e3a2f;
            border-radius: 24px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 0 3px #ffd966, 0 0 0 6px #b97f10;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            margin-bottom: 8px;
            color: #ffefb9;
            text-shadow: 2px 2px 0 #5a3e1a;
            padding: 0 8px;
        }
        .status-box {
            background: #00000088;
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        button {
            background: #f4c542;
            border: none;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            color: #2d2b1f;
            margin: 6px 4px;
            box-shadow: 0 3px 0 #8b5a2b;
            transition: 0.07s linear;
            font-family: inherit;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b5a2b;
        }
        .controls-note {
            background: #000000aa;
            text-align: center;
            font-size: 0.7rem;
            padding: 8px;
            border-radius: 28px;
            margin-top: 12px;
            color: #f5e2b0;
        }
        .loading {
            color: #ffefb9;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="350" height="550"></canvas>
        <div class="info-panel">
            <div class="status-box">📄 صفحه <span id="pageNum">1</span>/<span id="totalPages">0</span></div>
            <div class="status-box">⏱️ <span id="timer">0.00</span> s</div>
            <div class="status-box" id="gameState">⏸ آماده</div>
        </div>
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button id="startBtn">🚀 شروع</button>
            <button id="resetBtn">🔄 ریست</button>
        </div>
        <div class="controls-note" id="sensorMsg">
            📱 گوشی را کج کنید → توپ حرکت می‌کند | در حال بارگذاری لول...
        </div>
        <div class="loading" id="loadingMsg"></div>
    </div>
</div>

<script>
    (function(){
        // ========== CANVAS ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 350, H = 550;
        canvas.width = W;
        canvas.height = H;
        
        // ========== توپ ==========
        let ball = {
            x: W/2,
            y: H/2,
            vx: 0,
            vy: 0,
            radius: 11
        };
        
        // ========== فیزیک ==========
        const GRAVITY_FORCE = 0.5;
        const DAMPING = 0.99;
        const WALL_BOUNCE = 0.92;
        const MAX_SPEED = 14;
        
        // ========== سنسور گوشی ==========
        let tiltX = 0, tiltY = 0;
        let sensorActive = false;
        
        // ========== وضعیت بازی ==========
        let gameActive = false;
        let currentPage = 0;
        let startTime = 0;
        let animationId = null;
        
        // ========== داده‌های لول از فایل ==========
        let levelData = null;           // کل داده لول
        let allPages = [];              // آرایه صفحات (هر صفحه آرایه‌ای از موانع)
        let TOTAL_PAGES = 0;
        
        // ========== تابع بارگذاری لول از فایل ==========
        async function loadLevelFromFile(levelNumber = 1) {
            try {
                // شبیه‌سازی بارگذاری از فایل level1.json
                // در حالت واقعی: const response = await fetch(`levels/level${levelNumber}.json`);
                // برای نمایش، یک آبجکت در اینجا تعریف می‌کنیم که گویی از فایل آمده است
                
                // این داده‌ها معادل محتوای فایل level1.json است
                const levelJsonData = {
                    level: 1,
                    name: "آغاز ماجرا",
                    totalPages: 3,
                    // خصوصیات اضافی برای آینده
                    author: "Game Designer",
                    difficulty: "easy",
                    gravityMultiplier: 1.0,
                    // موانع هر صفحه
                    pages: [
                        {   // صفحه 0
                            obstacles: [
                                { x: 60, y: 80, w: 20, h: 100, type: "wall", friction: 0.92 },
                                { x: 270, y: 120, w: 20, h: 80, type: "wall", friction: 0.92 },
                                { x: 120, y: 200, w: 80, h: 15, type: "platform", friction: 0.9 },
                                { x: 220, y: 300, w: 15, h: 60, type: "pillar", friction: 0.88 },
                                { x: 80, y: 350, w: 60, h: 15, type: "platform", friction: 0.9 },
                                { x: 250, y: 420, w: 40, h: 15, type: "platform", friction: 0.9 },
                                { x: 150, y: 470, w: 20, h: 40, type: "box", friction: 0.85 },
                                { x: 300, y: 200, w: 30, h: 30, type: "box", friction: 0.85 }
                            ]
                        },
                        {   // صفحه 1
                            obstacles: [
                                { x: 40, y: 60, w: 20, h: 120, type: "wall", friction: 0.92 },
                                { x: 290, y: 80, w: 20, h: 100, type: "wall", friction: 0.92 },
                                { x: 100, y: 180, w: 70, h: 15, type: "platform", friction: 0.9 },
                                { x: 200, y: 250, w: 15, h: 80, type: "pillar", friction: 0.88 },
                                { x: 140, y: 320, w: 50, h: 15, type: "platform", friction: 0.9 },
                                { x: 260, y: 380, w: 60, h: 15, type: "platform", friction: 0.9 },
                                { x: 80, y: 450, w: 30, h: 30, type: "box", friction: 0.85 },
                                { x: 200, y: 490, w: 40, h: 20, type: "box", friction: 0.85 },
                                { x: 310, y: 300, w: 25, h: 25, type: "box", friction: 0.85 }
                            ]
                        },
                        {   // صفحه 2 (آخرین - با حفره قرمز)
                            obstacles: [
                                { x: 50, y: 70, w: 20, h: 100, type: "wall", friction: 0.92 },
                                { x: 280, y: 90, w: 20, h: 90, type: "wall", friction: 0.92 },
                                { x: 100, y: 180, w: 60, h: 15, type: "platform", friction: 0.9 },
                                { x: 210, y: 240, w: 15, h: 70, type: "pillar", friction: 0.88 },
                                { x: 120, y: 310, w: 80, h: 15, type: "platform", friction: 0.9 },
                                { x: 250, y: 370, w: 50, h: 15, type: "platform", friction: 0.9 },
                                { x: 60, y: 420, w: 40, h: 20, type: "box", friction: 0.85 },
                                { x: 180, y: 460, w: 35, h: 20, type: "box", friction: 0.85 },
                                { x: 300, y: 480, w: 30, h: 30, type: "box", friction: 0.85 }
                            ]
                        }
                    ],
                    // تنظیمات حفره قرمز (سرتاسر عرض پایین)
                    redHole: {
                        fullWidth: true,    // کل عرض پایین
                        height: 32,
                        yOffset: 0          // از پایین صفحه
                    }
                };
                
                // شبیه‌سازی تاخیر شبکه
                document.getElementById('loadingMsg').innerHTML = 'در حال بارگذاری سطح 1...';
                
                // در حالت واقعی: levelData = await response.json();
                levelData = levelJsonData;
                
                TOTAL_PAGES = levelData.totalPages;
                allPages = [];
                
                // تبدیل داده‌های فایل به فرمت موانع (با حفظ خصوصیات اضافی)
                for(let i = 0; i < levelData.pages.length; i++) {
                    let pageObstacles = [];
                    for(let obs of levelData.pages[i].obstacles) {
                        pageObstacles.push({
                            x: obs.x,
                            y: obs.y,
                            w: obs.w,
                            h: obs.h,
                            type: obs.type,
                            friction: obs.friction || 0.92
                        });
                    }
                    allPages.push(pageObstacles);
                }
                
                document.getElementById('totalPages').innerText = TOTAL_PAGES;
                document.getElementById('loadingMsg').innerHTML = '✅ سطح 1 بارگذاری شد! دکمه START را بزنید.';
                document.getElementById('sensorMsg').innerHTML = '📱 گوشی را کج کنید → توپ حرکت می‌کند | برای شروع START را بزنید';
                
                // ریست بازی پس از بارگذاری
                resetGame();
                
            } catch(error) {
                console.error('خطا در بارگذاری فایل:', error);
                document.getElementById('loadingMsg').innerHTML = '❌ خطا در بارگذاری سطح!';
            }
        }
        
        // ========== دریافت موانع صفحه فعلی ==========
        function getCurrentObstacles() {
            if(!allPages.length || currentPage >= allPages.length) return [];
            return allPages[currentPage];
        }
        
        // ========== برخورد توپ با موانع ==========
        function handleObstacleCollision(obs) {
            let closestX = Math.max(obs.x, Math.min(ball.x, obs.x + obs.w));
            let closestY = Math.max(obs.y, Math.min(ball.y, obs.y + obs.h));
            let dx = ball.x - closestX;
            let dy = ball.y - closestY;
            let dist = Math.hypot(dx, dy);
            
            if(dist < ball.radius) {
                let angle = Math.atan2(dy, dx);
                let overlap = ball.radius - dist;
                let pushX = Math.cos(angle) * overlap;
                let pushY = Math.sin(angle) * overlap;
                ball.x += pushX;
                ball.y += pushY;
                
                let nx = dx / dist;
                let ny = dy / dist;
                let vdotn = ball.vx * nx + ball.vy * ny;
                if(vdotn < 0) {
                    let bounceFactor = obs.friction || WALL_BOUNCE;
                    let new_vdotn = -vdotn * bounceFactor;
                    ball.vx += (new_vdotn - vdotn) * nx;
                    ball.vy += (new_vdotn - vdotn) * ny;
                }
                
                let spd = Math.hypot(ball.vx, ball.vy);
                if(spd > MAX_SPEED) {
                    ball.vx = ball.vx / spd * MAX_SPEED;
                    ball.vy = ball.vy / spd * MAX_SPEED;
                }
                return true;
            }
            return false;
        }
        
        // ========== برخورد با دیوارها ==========
        function handleWallCollision() {
            if(ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy = -ball.vy * WALL_BOUNCE;
            }
            if(ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx = -ball.vx * WALL_BOUNCE;
            }
            if(ball.x + ball.radius > W) {
                ball.x = W - ball.radius;
                ball.vx = -ball.vx * WALL_BOUNCE;
            }
            
            if(!gameActive) {
                if(ball.y + ball.radius > H) {
                    ball.y = H - ball.radius;
                    ball.vy = -ball.vy * WALL_BOUNCE;
                }
            } else {
                if(ball.y + ball.radius >= H) {
                    goToNextPage();
                }
            }
        }
        
        // ========== رفتن به صفحه بعد ==========
        function goToNextPage() {
            if(currentPage + 1 < TOTAL_PAGES) {
                currentPage++;
                ball.y = ball.radius + 5;
                ball.x = Math.min(W - ball.radius, Math.max(ball.radius, ball.x));
                ball.vy = Math.abs(ball.vy) * 0.4;
                document.getElementById('pageNum').innerText = currentPage + 1;
            } else {
                if(isInRedHole()) {
                    winGame();
                } else {
                    ball.y = ball.radius + 5;
                    ball.vy = Math.abs(ball.vy) * 0.3;
                }
            }
        }
        
        // ========== حفره قرمز - کل عرض پایین ==========
        function isInRedHole() {
            // طبق تغییر دوم: حفره قرمز کل ضلع پایینی را می‌پوشاند
            // فقط کافی است توپ به پایین صفحه رسیده باشد و بازی فعال باشد
            return (ball.y + ball.radius >= H - 5);
        }
        
        // ========== برد ==========
        function winGame() {
            gameActive = false;
            let elapsed = (performance.now() - startTime) / 1000;
            alert(`🎉 پیروزی! 🎉\nزمان: ${elapsed.toFixed(2)} ثانیه\nرکورد شما ثبت شد!`);
            document.getElementById('gameState').innerHTML = '🏆 قهرمان';
        }
        
        // ========== اعمال جاذبه از سنسور ==========
        function applyGravity() {
            let gravityMult = levelData ? (levelData.gravityMultiplier || 1.0) : 1.0;
            ball.vx += tiltX * GRAVITY_FORCE * gravityMult;
            ball.vy += tiltY * GRAVITY_FORCE * gravityMult;
            
            let spd = Math.hypot(ball.vx, ball.vy);
            if(spd > MAX_SPEED) {
                ball.vx = ball.vx / spd * MAX_SPEED;
                ball.vy = ball.vy / spd * MAX_SPEED;
            }
            ball.vx *= DAMPING;
            ball.vy *= DAMPING;
        }
        
        // ========== به روز رسانی فیزیک ==========
        function updatePhysics() {
            if(!gameActive) return;
            
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            applyGravity();
            
            let obstacles = getCurrentObstacles();
            for(let obs of obstacles) {
                handleObstacleCollision(obs);
            }
            
            handleWallCollision();
            
            let elapsed = (performance.now() - startTime) / 1000;
            document.getElementById('timer').innerText = elapsed.toFixed(2);
        }
        
        // ========== رسم ==========
        function draw() {
            ctx.clearRect(0, 0, W, H);
            
            // رسم موانع با رنگ‌های متفاوت بر اساس نوع
            let obstacles = getCurrentObstacles();
            for(let obs of obstacles) {
                // رنگ بر اساس نوع مانع
                switch(obs.type) {
                    case 'wall':
                        ctx.fillStyle = '#8B5A2B';
                        break;
                    case 'platform':
                        ctx.fillStyle = '#A8763E';
                        break;
                    case 'pillar':
                        ctx.fillStyle = '#6F4F37';
                        break;
                    case 'box':
                        ctx.fillStyle = '#C87A3A';
                        break;
                    default:
                        ctx.fillStyle = '#8B5A2B';
                }
                ctx.shadowBlur = 3;
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.fillStyle = '#5A3A1A';
                ctx.fillRect(obs.x + 3, obs.y + 3, obs.w - 6, obs.h - 6);
                ctx.fillStyle = '#FFD699';
                ctx.fillRect(obs.x + 5, obs.y + 8, obs.w - 10, 3);
            }
            
            // حفره قرمز سرتاسر ضلع پایینی (تغییر دوم)
            if(currentPage === TOTAL_PAGES - 1) {
                ctx.fillStyle = '#FF3333DD';
                ctx.shadowBlur = 8;
                ctx.fillRect(0, H - 35, W, 35);
                ctx.fillStyle = '#FF0000';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('🔥 مقصد نهایی 🔥', W/2 - 70, H - 12);
            }
            
            // رسم توپ
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius - 1, 0, Math.PI * 2);
            ctx.fillStyle = '#FFD966';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ball.x - 3, ball.y - 3, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            
            if(!gameActive) {
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#FFAA55';
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 8]);
                ctx.strokeRect(5, H - 25, W - 10, 20);
                ctx.setLineDash([]);
            }
            
            ctx.shadowBlur = 0;
        }
        
        // ========== سنسور گوشی ==========
        function initSensor() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.getElementById('sensorMsg').innerHTML = '📱 iOS detected. Click START to enable sensor.';
                const startBtn = document.getElementById('startBtn');
                const originalClick = startBtn.onclick;
                startBtn.onclick = (e) => {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                sensorActive = true;
                                document.getElementById('sensorMsg').innerHTML = '✅ سنسور فعال شد! گوشی را کج کنید.';
                            }
                        })
                        .catch(err => {
                            console.log(err);
                            document.getElementById('sensorMsg').innerHTML = '⚠️ سنسور در دسترس نیست. از ماوس استفاده کنید.';
                        });
                    if(originalClick) originalClick(e);
                };
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                sensorActive = true;
                document.getElementById('sensorMsg').innerHTML = '📱 سنسور فعال - گوشی را کج کنید';
            }
        }
        
        function handleOrientation(event) {
            let gamma = event.gamma;
            let beta = event.beta;
            if(gamma != null && beta != null) {
                tiltX = Math.min(1, Math.max(-1, gamma / 45));
                tiltY = Math.min(1, Math.max(-1, beta / 45));
            }
        }
        
        // ========== شروع بازی ==========
        function startGame() {
            if(!levelData) {
                alert('لطفاً صبر کنید، سطح در حال بارگذاری است...');
                return;
            }
            if(gameActive) return;
            gameActive = true;
            currentPage = 0;
            ball.x = W/2;
            ball.y = H/2;
            ball.vx = 0;
            ball.vy = 0;
            startTime = performance.now();
            document.getElementById('pageNum').innerText = '1';
            document.getElementById('gameState').innerHTML = '🎮 در حال بازی';
            document.getElementById('sensorMsg').innerHTML = '🎯 توپ را به سمت پایین هدایت کن! ناحیه قرمز هدف نهایی است.';
        }
        
        // ========== ریست کامل ==========
        function resetGame() {
            gameActive = false;
            currentPage = 0;
            ball.x = W/2;
            ball.y = H/2;
            ball.vx = 0;
            ball.vy = 0;
            tiltX = 0;
            tiltY = 0;
            document.getElementById('pageNum').innerText = '1';
            document.getElementById('timer').innerText = '0.00';
            document.getElementById('gameState').innerHTML = '⏸ آماده';
            if(levelData) {
                document.getElementById('sensorMsg').innerHTML = '📱 گوشی را کج کنید | برای شروع START را بزنید';
            }
        }
        
        // ========== اتصال دکمه‌ها ==========
        document.getElementById('startBtn').onclick = startGame;
        document.getElementById('resetBtn').onclick = resetGame;
        
        // ========== حلقه اصلی ==========
        function gameLoop() {
            updatePhysics();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // راه‌اندازی
        initSensor();
        loadLevelFromFile(1);  // بارگذاری لول از فایل
        gameLoop();
    })();
</script>
</body>
</html>
