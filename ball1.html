<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>لول گرانشی - مسیر موانع | پینگ پونگ معمایی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a2f2a 0%, #051a12 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', monospace;
            touch-action: none;
        }

        .game-container {
            background: #00000055;
            border-radius: 32px;
            padding: 16px;
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #1e3a2f;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 0 0 3px #ffd966;
            cursor: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 16px;
            margin-bottom: 8px;
            color: #ffefb9;
            background: #00000066;
            padding: 8px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .status {
            font-weight: bold;
            background: #1f2a1b;
            padding: 4px 12px;
            border-radius: 24px;
        }

        button {
            background: #f4c542;
            border: none;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            color: #2d2b1f;
            margin: 6px 4px;
            box-shadow: 0 3px 0 #8b5a2b;
            transition: 0.07s linear;
            font-family: inherit;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b5a2b;
        }

        .controls-note {
            background: #000000aa;
            text-align: center;
            font-size: 0.7rem;
            padding: 8px;
            border-radius: 28px;
            margin-top: 12px;
            color: #f5e2b0;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="380" height="520"></canvas>
        <div class="info-panel">
            <div>🎯 <span id="levelDisplay">لول ۱</span> | 📄 <span id="pageDisplay">1</span>/<span id="totalPages">0</span></div>
            <div>⏱️ <span id="timerDisplay">0.00</span> s</div>
            <div class="status" id="gameStateLabel">⏸ آماده</div>
        </div>
        <div class="controls-note" id="infoMessage">
            📱 گوشی را کج کنید → توپ حرکت می‌کند. ابتدا دکمه START را بزنید.
        </div>
        <div style="display: flex; justify-content: center; gap: 12px; margin-top: 8px;">
            <button id="startGameBtn">🚀 شروع مرحله ۱</button>
            <button id="resetGameBtn">🔄 ریست کامل</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let W = 380, H = 520;
        canvas.width = W; canvas.height = H;

        // ---------- متغیرهای فیزیک توپ ----------
        let ball = { x: W/2, y: H/2, vx: 0, vy: 0, radius: 10 };
        const GRAVITY_FORCE = 0.48;
        const DAMPING = 0.99;
        const WALL_BOUNCE = 0.92;
        const MAX_SPEED = 13;
        
        // ---------- سنسور شیب (موبایل) و حالت ماوس ----------
        let tiltX = 0, tiltY = 0;
        let useMouseGravity = false;
        let mouseGX = 0, mouseGY = 0;
        
        // ---------- وضعیت بازی ----------
        let gameActive = false;      // بعد از start فعال میشود
        let currentLevel = 1;
        let currentPageIndex = 0;    // 0-based
        let levelData = null;
        let startTime = 0;
        let animationId = null;
        
        // ---------- تعریف اشیاء برخورد ----------
        // هر سلول ماتریس: نوع مانع (0 = خالی, 1 = دیوار/جعبه سخت, 2 = آجر, 3 = سنگ/چوب, 4 = چوب سبک)
        // در برخورد همه مثل دیوار رفتار می‌کنند (انعکاس با ضریب متفاوت کمی)
        const OBSTACLE_TYPES = {
            0: null,
            1: { color: "#8B5A2B", restitution: 0.85, name: "دیوار" },    // جعبه/دیوار
            2: { color: "#C05A2A", restitution: 0.88, name: "آجر" },
            3: { color: "#6F4F37", restitution: 0.80, name: "سنگ" },
            4: { color: "#CDA87C", restitution: 0.90, name: "چوب" }
        };
        
        // ========== تعریف لول 1 ==========
        // هر لول شامل: 
        // totalPages (تعداد صفحه), pages[pageIndex] = ماتریس (ارتفاع 15 ردیف، عرض 19 سلول تقریبا)
        // توجه: توپ در ابعاد real پیکسل برخورد خواهد داشت. هر سلول 20x20 پیکسل (W=380->19 سلول، H=520->26 سلول ولی برای سادگی 15 ردیف کافی)
        // برای برخورد ماتریس موانع را روی لایه‌ای با ابعاد gridCell=20px میسازیم.
        const CELL_SIZE = 20;
        const GRID_W = Math.floor(W / CELL_SIZE); // 19
        const GRID_H = Math.floor(H / CELL_SIZE); // 26 (اما ما موانع را فقط در ناحیه play قرار میدهیم)
        
        // صفحه‌های لول 1: هدف نهایی در آخرین صفحه، یک حفره قرمز در پایین (ردیف آخر)
        function createLevel1() {
            // مرحله ۱ شامل ۳ صفحه
            let pages = [];
            // صفحه 0 : مسیر ساده با چند مانع
            let page0 = Array(GRID_H).fill().map(() => Array(GRID_W).fill(0));
            // موانع نمونه : دو دیوار عمودی و چند جعبه
            for(let i=5; i<=10; i++) { page0[i][5] = 1; page0[i][13] = 1; } // ستون مانع
            for(let i=12; i<=16; i++) { page0[8][i] = 2; } // آجرها
            page0[14][9] = 3; page0[14][10] = 3; page0[13][12]=4;
            
            // صفحه 1 : پیچیده‌تر
            let page1 = Array(GRID_H).fill().map(() => Array(GRID_W).fill(0));
            for(let i=2; i<=8; i++) { page1[i][4] = 1; }
            for(let i=10; i<=17; i++) { page1[i][14] = 2; }
            page1[5][10]=3; page1[6][11]=4; page1[7][12]=4; page1[18][7]=1;
            
            // صفحه 2 (آخرین): حفره قرمز در پایین (ردیف آخر y=H-10)
            let page2 = Array(GRID_H).fill().map(() => Array(GRID_W).fill(0));
            for(let i=3; i<=12; i++) { page2[10][i] = 1; }
            page2[20][9] = 3; page2[21][10]=4; page2[22][11]=1;
            // special flag: hole in bottom (نیازی به ماتریس نیست، در render بررسی می‌کنیم)
            
            pages.push(page0, page1, page2);
            return {
                totalPages: pages.length,
                pagesMatrix: pages,
                hasRedHoleAtEnd: true
            };
        }
        
        // بارگذاری لول
        function loadLevel(levelNum) {
            if(levelNum === 1) return createLevel1();
            // میتوان لول ۲ ساخت
            return createLevel1();
        }
        
        // بازسازی جلسه
        function initGame(level=1) {
            levelData = loadLevel(level);
            currentPageIndex = 0;
            // موقعیت شروع توپ در صفحه اول (مرکز)
            ball.x = W/2;
            ball.y = H/2;
            ball.vx = 0; ball.vy = 0;
            gameActive = false;
            document.getElementById("levelDisplay").innerText = `لول ${level}`;
            document.getElementById("pageDisplay").innerText = (currentPageIndex+1);
            document.getElementById("totalPages").innerText = levelData.totalPages;
            document.getElementById("timerDisplay").innerText = "0.00";
            document.getElementById("gameStateLabel").innerText = "⏸ آماده";
            document.getElementById("infoMessage").innerHTML = `📱 گوشی را کج کنید | START را بزنید. صفحه ${currentPageIndex+1} از ${levelData.totalPages}`;
            draw(); // نمایش موانع
        }
        
        // شروع بازی (حذف دیوار پایینی)
        function startGameplay() {
            if(gameActive) return;
            gameActive = true;
            startTime = performance.now();
            document.getElementById("gameStateLabel").innerText = "🎮 در حال بازی";
            document.getElementById("infoMessage").innerHTML = "⭐ به پایین سقوط کن تا صفحه بعد! از حفره قرمز آخر بگذر.";
            // از این لحظه دیوار پایینی در برخوردها نادیده گرفته می‌شود (در handleCollisions بررسی)
        }
        
        // بررسی رسیدن به صفحه بعد (خروج از پایین)
        function checkPageTransition() {
            if(!gameActive) return false;
            // اگر توپ از پایین فریم خارج شد (y + radius >= H)
            if(ball.y + ball.radius >= H) {
                // صفحه بعدی
                if(currentPageIndex + 1 < levelData.totalPages) {
                    // برو به صفحه بعد، توپ را از بالا وارد کن
                    currentPageIndex++;
                    ball.y = ball.radius + 5;
                    ball.x = Math.min(W - ball.radius, Math.max(ball.radius, ball.x));
                    ball.vy = ball.vy * 0.6; // کاهش سرعت عمودی برای ورود ملایم
                    document.getElementById("pageDisplay").innerText = (currentPageIndex+1);
                    document.getElementById("infoMessage").innerHTML = `📄 صفحه ${currentPageIndex+1} از ${levelData.totalPages}`;
                    return true;
                }
                else {
                    // آخرین صفحه: اگر حفره قرمز داریم، باید بررسی کنیم توپ روی حفره افتاده باشد
                    if(levelData.hasRedHoleAtEnd && isBallInRedHole()) {
                        // برد! پایان موفق
                        finishGameWin();
                    }
                    else if(levelData.hasRedHoleAtEnd && !isBallInRedHole()) {
                        // افتاده بیرون ولی نه روی حفره -> penalty, respawn بالای صفحه
                        ball.y = ball.radius + 5;
                        ball.vy *= 0.4;
                    } else {
                        finishGameWin();
                    }
                    return true;
                }
            }
            return false;
        }
        
        // تشخیص حفره قرمز (مستطیل انتهایی پایین وسط)
        function isBallInRedHole() {
            let holeX1 = W/2 - 30, holeX2 = W/2 + 30;
            let holeY1 = H - 25, holeY2 = H;
            return (ball.x + ball.radius > holeX1 && ball.x - ball.radius < holeX2 && ball.y + ball.radius > holeY1);
        }
        
        function finishGameWin() {
            gameActive = false;
            let elapsed = (performance.now() - startTime) / 1000;
            alert(`✨ پیروزی! زمان: ${elapsed.toFixed(2)} ثانیه ✨\nرکورد ثبت نشد (برای اتصال بعدی PHP)`);
            document.getElementById("gameStateLabel").innerText = "🏆 برنده!";
            gameActive = false;
            // می‌توان ریست دستی کرد
        }
        
        // ---------- برخورد با موانع (ماتریس) ----------
        function handleObstaclesCollision() {
            const matrix = levelData.pagesMatrix[currentPageIndex];
            if(!matrix) return;
            // بررسی برخورد با سلول‌های اطراف توپ
            let leftCell = Math.floor((ball.x - ball.radius) / CELL_SIZE);
            let rightCell = Math.floor((ball.x + ball.radius) / CELL_SIZE);
            let topCell = Math.floor((ball.y - ball.radius) / CELL_SIZE);
            let bottomCell = Math.floor((ball.y + ball.radius) / CELL_SIZE);
            leftCell = Math.max(0, leftCell);
            rightCell = Math.min(GRID_W-1, rightCell);
            topCell = Math.max(0, topCell);
            bottomCell = Math.min(GRID_H-1, bottomCell);
            
            for(let row = topCell; row <= bottomCell; row++) {
                for(let col = leftCell; col <= rightCell; col++) {
                    let val = matrix[row][col];
                    if(val !== 0 && OBSTACLE_TYPES[val]) {
                        let restitution = OBSTACLE_TYPES[val].restitution;
                        let rect = { x: col*CELL_SIZE, y: row*CELL_SIZE, w: CELL_SIZE, h: CELL_SIZE };
                        // حل برخورد دایره و مستطیل
                        let closestX = Math.max(rect.x, Math.min(ball.x, rect.x+rect.w));
                        let closestY = Math.max(rect.y, Math.min(ball.y, rect.y+rect.h));
                        let dx = ball.x - closestX;
                        let dy = ball.y - closestY;
                        let dist = Math.hypot(dx, dy);
                        if(dist < ball.radius) {
                            let angle = Math.atan2(dy, dx);
                            let overlap = ball.radius - dist;
                            let pushX = Math.cos(angle) * overlap;
                            let pushY = Math.sin(angle) * overlap;
                            ball.x += pushX;
                            ball.y += pushY;
                            // تغییر سرعت
                            let nx = dx / dist;
                            let ny = dy / dist;
                            let vdotn = ball.vx * nx + ball.vy * ny;
                            if(vdotn < 0) {
                                let new_vdotn = -vdotn * restitution;
                                ball.vx += (new_vdotn - vdotn) * nx;
                                ball.vy += (new_vdotn - vdotn) * ny;
                            }
                            // محدودیت سرعت
                            let spd = Math.hypot(ball.vx, ball.vy);
                            if(spd > MAX_SPEED) {
                                ball.vx = ball.vx/spd * MAX_SPEED;
                                ball.vy = ball.vy/spd * MAX_SPEED;
                            }
                        }
                    }
                }
            }
        }
        
        // برخورد با دیوارها (به جز پایین در حالت active)
        function handleWalls() {
            // بالا
            if(ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy = -ball.vy * WALL_BOUNCE;
            }
            // چپ و راست
            if(ball.x - ball.radius < 0) { ball.x = ball.radius; ball.vx = -ball.vx * WALL_BOUNCE; }
            if(ball.x + ball.radius > W) { ball.x = W - ball.radius; ball.vx = -ball.vx * WALL_BOUNCE; }
            // پایین فقط در حالت غیر فعال یا اگر بازی فعال است و صفحه آخر؟ ما در checkPageTransition خروج مدیریت می‌کنیم
            if(!gameActive) {
                if(ball.y + ball.radius > H) { ball.y = H - ball.radius; ball.vy = -ball.vy * WALL_BOUNCE; }
            } else {
                // در حالت بازی، اجازه خروج به پایین را می‌دهیم (اما بازخورد bounce نمیخورد)
                // کار transition را انجام میدهیم. برای جلوگیری از نویز محدودیت نمیزنیم.
                if(ball.y + ball.radius > H + 5) {
                    // فراخوانی انتقال صفحه
                    checkPageTransition();
                }
            }
        }
        
        function applyGravity() {
            let gravX = useMouseGravity ? mouseGX : tiltX;
            let gravY = useMouseGravity ? mouseGY : tiltY;
            ball.vx += gravX * GRAVITY_FORCE;
            ball.vy += gravY * GRAVITY_FORCE;
            let spd = Math.hypot(ball.vx, ball.vy);
            if(spd > MAX_SPEED) { ball.vx = ball.vx/spd * MAX_SPEED; ball.vy = ball.vy/spd * MAX_SPEED; }
            ball.vx *= DAMPING;
            ball.vy *= DAMPING;
        }
        
        function updatePhysics() {
            if(!gameActive && !levelData) return;
            ball.x += ball.vx;
            ball.y += ball.vy;
            applyGravity();
            handleObstaclesCollision();
            handleWalls();
            if(gameActive) {
                let elapsed = (performance.now() - startTime)/1000;
                document.getElementById("timerDisplay").innerText = elapsed.toFixed(2);
            }
        }
        
        // رسم
        function draw() {
            ctx.clearRect(0,0,W,H);
            // رسم موانع صفحه جاری
            const matrix = levelData?.pagesMatrix[currentPageIndex];
            if(matrix){
                for(let row=0; row<GRID_H; row++){
                    for(let col=0; col<GRID_W; col++){
                        let val = matrix[row][col];
                        if(val !== 0 && OBSTACLE_TYPES[val]){
                            ctx.fillStyle = OBSTACLE_TYPES[val].color;
                            ctx.shadowBlur = 2;
                            ctx.fillRect(col*CELL_SIZE, row*CELL_SIZE, CELL_SIZE-1, CELL_SIZE-1);
                            ctx.fillStyle = "#00000033";
                            ctx.fillRect(col*CELL_SIZE+2, row*CELL_SIZE+2, CELL_SIZE-5, CELL_SIZE-5);
                        }
                    }
                }
            }
            // حفره قرمز در آخرین صفحه
            if(levelData && levelData.hasRedHoleAtEnd && currentPageIndex === levelData.totalPages-1){
                ctx.fillStyle = "#e33f3fdd";
                ctx.shadowBlur = 8;
                ctx.fillRect(W/2-35, H-28, 70, 28);
                ctx.fillStyle = "#ff0000";
                ctx.font = "bold 18px monospace";
                ctx.fillText("⚡", W/2-8, H-6);
            }
            // توپ
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius-1, 0, Math.PI*2);
            ctx.fillStyle = "#FFD966";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ball.x-2, ball.y-2, 3, 0, Math.PI*2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.font = "bold 12px";
        }
        
        // سنسور و ماوس
        function handleOrientation(e) {
            if(!gameActive) return;
            let gamma = e.gamma; let beta = e.beta;
            if(gamma!=null && beta!=null){
                tiltX = Math.min(1, Math.max(-1, gamma/40));
                tiltY = Math.min(1, Math.max(-1, beta/40));
            }
        }
        function enableMouse(){
            useMouseGravity=true;
            canvas.addEventListener('mousemove',(e)=>{
                let rect=canvas.getBoundingClientRect();
                let mx = (e.clientX-rect.left)*(W/rect.width);
                let my = (e.clientY-rect.top)*(H/rect.height);
                mouseGX = (mx - W/2)/(W/2);
                mouseGY = (my - H/2)/(H/2);
                mouseGX = Math.min(0.9,Math.max(-0.9,mouseGX));
                mouseGY = Math.min(0.9,Math.max(-0.9,mouseGY));
            });
        }
        
        // راه‌اندازی اولیه
        function requestSensor() {
            if(typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission){
                document.getElementById("infoMessage").innerHTML = "برای فعال‌سازی سنسور، دکمه START را بزنید (iOS)";
                const startBtn = document.getElementById('startGameBtn');
                const originalStart = startBtn.onclick;
                startBtn.onclick = ()=>{
                    DeviceOrientationEvent.requestPermission().then(perm=>{
                        if(perm==='granted'){
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    }).catch(()=>enableMouse());
                    if(originalStart) originalStart();
                    startGameplay();
                };
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                enableMouse();
            }
        }
        
        document.getElementById('startGameBtn').onclick = () => {
            if(!gameActive){
                startGameplay();
            }
        };
        document.getElementById('resetGameBtn').onclick = () => {
            if(animationId) cancelAnimationFrame(animationId);
            initGame(1);
            gameActive=false;
            draw();
        };
        
        function gameLoop(){
            updatePhysics();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        initGame(1);
        requestSensor();
        gameLoop();
    })();
</script>
</body>
</html>
