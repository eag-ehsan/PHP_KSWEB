<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>بازی توپ گرانشی - لول از فایل JSON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        .game-container {
            background: #0a1f12;
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            margin: 0 auto;
            background-color: #1e3a2f;
            border-radius: 24px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 0 3px #ffd966, 0 0 0 6px #b97f10;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            margin-bottom: 8px;
            color: #ffefb9;
            text-shadow: 2px 2px 0 #5a3e1a;
            padding: 0 8px;
        }
        .status-box {
            background: #00000088;
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        button {
            background: #f4c542;
            border: none;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            color: #2d2b1f;
            margin: 6px 4px;
            box-shadow: 0 3px 0 #8b5a2b;
            transition: 0.07s linear;
            font-family: inherit;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b5a2b;
        }
        .controls-note {
            background: #000000aa;
            text-align: center;
            font-size: 0.7rem;
            padding: 8px;
            border-radius: 28px;
            margin-top: 12px;
            color: #f5e2b0;
        }
        .loading {
            color: #ffefb9;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="350" height="550"></canvas>
        <div class="info-panel">
            <div class="status-box">📄 صفحه <span id="pageNum">1</span>/<span id="totalPages">0</span></div>
            <div class="status-box">⏱️ <span id="timer">0.00</span> s</div>
            <div class="status-box" id="gameState">⏸ آماده</div>
        </div>
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button id="startBtn">🚀 شروع</button>
            <button id="resetBtn">🔄 ریست</button>
        </div>
        <div class="controls-note" id="sensorMsg">
            📱 گوشی را کج کنید → توپ حرکت می‌کند | در حال بارگذاری لول...
        </div>
        <div class="loading" id="loadingMsg"></div>
    </div>
</div>

<script>
    (function(){
        // ========== CANVAS ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 350, H = 550;
        canvas.width = W;
        canvas.height = H;
        
        // ========== توپ ==========
        let ball = {
            x: W/2,
            y: H/2,
            vx: 0,
            vy: 0,
            radius: 11
        };
        
        // ========== فیزیک ==========
        const GRAVITY_FORCE = 0.5;
        const DAMPING = 0.99;
        const WALL_BOUNCE = 0.92;
        const MAX_SPEED = 14;
        
        // ========== سنسور گوشی ==========
        let tiltX = 0, tiltY = 0;
        let sensorActive = false;
        
        // ========== وضعیت بازی ==========
        let gameActive = false;
        let currentPage = 0;
        let startTime = 0;
        let animationId = null;
        
        // ========== داده‌های لول از فایل ==========
        let levelData = null;
        let allPages = [];
        let TOTAL_PAGES = 0;
        
        // ========== تابع بارگذاری لول از فایل JSON واقعی ==========
        async function loadLevelFromFile(levelNumber = 1) {
            try {
                document.getElementById('loadingMsg').innerHTML = 'در حال بارگذاری سطح ' + levelNumber + '...';
                document.getElementById('sensorMsg').innerHTML = '📱 در حال بارگذاری...';
                
                // بارگذاری واقعی از فایل JSON
                const response = await fetch(`level${levelNumber}.json`);
                
                if (!response.ok) {
                    throw new Error(`فایل level${levelNumber}.json یافت نشد!`);
                }
                
                levelData = await response.json();
                
                TOTAL_PAGES = levelData.totalPages;
                allPages = [];
                
                // تبدیل داده‌های فایل به فرمت موانع
                for(let i = 0; i < levelData.pages.length; i++) {
                    let pageObstacles = [];
                    for(let obs of levelData.pages[i].obstacles) {
                        pageObstacles.push({
                            x: obs.x,
                            y: obs.y,
                            w: obs.w,
                            h: obs.h,
                            type: obs.type,
                            friction: obs.friction || 0.92
                        });
                    }
                    allPages.push(pageObstacles);
                }
                
                document.getElementById('totalPages').innerText = TOTAL_PAGES;
                document.getElementById('loadingMsg').innerHTML = '✅ سطح ' + levelNumber + ' بارگذاری شد! دکمه START را بزنید.';
                document.getElementById('sensorMsg').innerHTML = '📱 گوشی را کج کنید → توپ حرکت می‌کند | برای شروع START را بزنید';
                
                // ریست بازی پس از بارگذاری
                resetGame();
                
            } catch(error) {
                console.error('خطا در بارگذاری فایل:', error);
                document.getElementById('loadingMsg').innerHTML = '❌ خطا: فایل level' + levelNumber + '.json پیدا نشد!<br>مطمئن شوید فایل در کنار HTML قرار دارد.';
                document.getElementById('sensorMsg').innerHTML = '⚠️ فایل سطح یافت نشد. لطفاً level1.json را ایجاد کنید.';
            }
        }
        
        // ========== دریافت موانع صفحه فعلی ==========
        function getCurrentObstacles() {
            if(!allPages.length || currentPage >= allPages.length) return [];
            return allPages[currentPage];
        }
        
        // ========== برخورد توپ با موانع ==========
        function handleObstacleCollision(obs) {
            let closestX = Math.max(obs.x, Math.min(ball.x, obs.x + obs.w));
            let closestY = Math.max(obs.y, Math.min(ball.y, obs.y + obs.h));
            let dx = ball.x - closestX;
            let dy = ball.y - closestY;
            let dist = Math.hypot(dx, dy);
            
            if(dist < ball.radius) {
                let angle = Math.atan2(dy, dx);
                let overlap = ball.radius - dist;
                let pushX = Math.cos(angle) * overlap;
                let pushY = Math.sin(angle) * overlap;
                ball.x += pushX;
                ball.y += pushY;
                
                let nx = dx / dist;
                let ny = dy / dist;
                let vdotn = ball.vx * nx + ball.vy * ny;
                if(vdotn < 0) {
                    let bounceFactor = obs.friction || WALL_BOUNCE;
                    let new_vdotn = -vdotn * bounceFactor;
                    ball.vx += (new_vdotn - vdotn) * nx;
                    ball.vy += (new_vdotn - vdotn) * ny;
                }
                
                let spd = Math.hypot(ball.vx, ball.vy);
                if(spd > MAX_SPEED) {
                    ball.vx = ball.vx / spd * MAX_SPEED;
                    ball.vy = ball.vy / spd * MAX_SPEED;
                }
                return true;
            }
            return false;
        }
        
        // ========== برخورد با دیوارها ==========
        function handleWallCollision() {
            if(ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy = -ball.vy * WALL_BOUNCE;
            }
            if(ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx = -ball.vx * WALL_BOUNCE;
            }
            if(ball.x + ball.radius > W) {
                ball.x = W - ball.radius;
                ball.vx = -ball.vx * WALL_BOUNCE;
            }
            
            if(!gameActive) {
                if(ball.y + ball.radius > H) {
                    ball.y = H - ball.radius;
                    ball.vy = -ball.vy * WALL_BOUNCE;
                }
            } else {
                if(ball.y + ball.radius >= H) {
                    goToNextPage();
                }
            }
        }
        
        // ========== رفتن به صفحه بعد ==========
        function goToNextPage() {
            if(currentPage + 1 < TOTAL_PAGES) {
                currentPage++;
                ball.y = ball.radius + 5;
                ball.x = Math.min(W - ball.radius, Math.max(ball.radius, ball.x));
                ball.vy = Math.abs(ball.vy) * 0.4;
                document.getElementById('pageNum').innerText = currentPage + 1;
            } else {
                if(isInRedHole()) {
                    winGame();
                } else {
                    ball.y = ball.radius + 5;
                    ball.vy = Math.abs(ball.vy) * 0.3;
                }
            }
        }
        
        // ========== حفره قرمز - کل عرض پایین ==========
        function isInRedHole() {
            return (ball.y + ball.radius >= H - 5);
        }
        
        // ========== برد ==========
        function winGame() {
            gameActive = false;
            let elapsed = (performance.now() - startTime) / 1000;
            alert(`🎉 پیروزی! 🎉\nزمان: ${elapsed.toFixed(2)} ثانیه\nرکورد شما ثبت شد!`);
            document.getElementById('gameState').innerHTML = '🏆 قهرمان';
        }
        
        // ========== اعمال جاذبه از سنسور ==========
        function applyGravity() {
            let gravityMult = levelData ? (levelData.gravityMultiplier || 1.0) : 1.0;
            ball.vx += tiltX * GRAVITY_FORCE * gravityMult;
            ball.vy += tiltY * GRAVITY_FORCE * gravityMult;
            
            let spd = Math.hypot(ball.vx, ball.vy);
            if(spd > MAX_SPEED) {
                ball.vx = ball.vx / spd * MAX_SPEED;
                ball.vy = ball.vy / spd * MAX_SPEED;
            }
            ball.vx *= DAMPING;
            ball.vy *= DAMPING;
        }
        
        // ========== به روز رسانی فیزیک ==========
        function updatePhysics() {
            if(!gameActive) return;
            
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            applyGravity();
            
            let obstacles = getCurrentObstacles();
            for(let obs of obstacles) {
                handleObstacleCollision(obs);
            }
            
            handleWallCollision();
            
            let elapsed = (performance.now() - startTime) / 1000;
            document.getElementById('timer').innerText = elapsed.toFixed(2);
        }
        
        // ========== رسم ==========
        function draw() {
            ctx.clearRect(0, 0, W, H);
            
            // رسم موانع
            let obstacles = getCurrentObstacles();

            for(let obs of obstacles) {
                switch(obs.type) {
                    case 'wall':
                        ctx.shadowBlur = 3;
                        
                        // پس زمینه اصلی سنگ (خاکستری ماینکرافتی)
                        ctx.fillStyle = '#6B6B6B';
                        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                        
                        // نویز و بافت سنگ (نقاط تصادفی)
                        ctx.fillStyle = '#7A7A7A';
                        for(let i = 0; i < 60; i++) {
                            let randX = obs.x + 3 + Math.random() * (obs.w - 6);
                            let randY = obs.y + 3 + Math.random() * (obs.h - 6);
                            ctx.fillRect(randX, randY, 2, 2);
                        }
                        
                        ctx.fillStyle = '#5A5A5A';
                        for(let i = 0; i < 40; i++) {
                            let randX = obs.x + 3 + Math.random() * (obs.w - 6);
                            let randY = obs.y + 3 + Math.random() * (obs.h - 6);
                            ctx.fillRect(randX, randY, 2, 2);
                        }
                        
                        // پیکسل‌های روشن تر (هایلایت)
                        ctx.fillStyle = '#8A8A8A';
                        for(let i = 0; i < 25; i++) {
                            let randX = obs.x + 4 + Math.random() * (obs.w - 8);
                            let randY = obs.y + 4 + Math.random() * (obs.h - 8);
                            ctx.fillRect(randX, randY, 1, 1);
                        }
                        
                        // ترک‌های عمودی و افقی شبیه سنگ
                        ctx.strokeStyle = '#4A4A4A';
                        ctx.lineWidth = 1.5;
                        
                        // ترک‌های افقی
                        for(let i = 0; i < 3; i++) {
                            let y = obs.y + 10 + (i * (obs.h / 4));
                            ctx.beginPath();
                            ctx.moveTo(obs.x + 8, y);
                            ctx.lineTo(obs.x + obs.w - 8, y);
                            ctx.stroke();
                        }
                        
                        // ترک‌های عمودی (با شکستگی)
                        ctx.beginPath();
                        ctx.moveTo(obs.x + obs.w * 0.3, obs.y + 5);
                        ctx.lineTo(obs.x + obs.w * 0.3 + 4, obs.y + obs.h * 0.2);
                        ctx.lineTo(obs.x + obs.w * 0.3 - 2, obs.y + obs.h * 0.4);
                        ctx.lineTo(obs.x + obs.w * 0.3 + 3, obs.y + obs.h * 0.6);
                        ctx.lineTo(obs.x + obs.w * 0.3 - 1, obs.y + obs.h - 8);
                        ctx.stroke();
                        
                        ctx.beginPath();
                        ctx.moveTo(obs.x + obs.w * 0.7, obs.y + 8);
                        ctx.lineTo(obs.x + obs.w * 0.7 - 3, obs.y + obs.h * 0.35);
                        ctx.lineTo(obs.x + obs.w * 0.7 + 2, obs.y + obs.h * 0.55);
                        ctx.lineTo(obs.x + obs.w * 0.7 - 4, obs.y + obs.h - 5);
                        ctx.stroke();
                        
                        // برجستگی لبه‌ها (نور از بالا-چپ)
                        ctx.fillStyle = '#8E8E8E';
                        ctx.fillRect(obs.x + 1, obs.y + 1, 3, obs.h - 2);
                        ctx.fillRect(obs.x + 1, obs.y + 1, obs.w - 2, 3);
                        
                        // سایه لبه راست و پایین
                        ctx.fillStyle = '#3A3A3A';
                        ctx.fillRect(obs.x + obs.w - 3, obs.y + 2, 2, obs.h - 4);
                        ctx.fillRect(obs.x + 2, obs.y + obs.h - 3, obs.w - 4, 2);
                        
                        // پیکسل‌های برجسته مانند سنگ ماینکرافت
                        ctx.fillStyle = '#9A9A9A';
                        ctx.fillRect(obs.x + 5, obs.y + 5, 3, 3);
                        ctx.fillRect(obs.x + obs.w - 12, obs.y + 15, 4, 4);
                        ctx.fillRect(obs.x + 18, obs.y + obs.h - 18, 3, 3);
                        
                        break;    
                        
                        
                    case 'platform':
                        ctx.shadowBlur = 3;
                        
                        // لایه زیرین خاک (قهوه‌ای)
                        ctx.fillStyle = '#8B5A2B';
                        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                        
                        // لایه چمن (سبز) در بالای پلتفرم
                        let grassHeight = Math.min(8, obs.h / 3);
                        ctx.fillStyle = '#4A8C3F';
                        ctx.fillRect(obs.x, obs.y, obs.w, grassHeight);
                        
                        // هایلایت چمن (نقاط روشن)
                        ctx.fillStyle = '#6AB55A';
                        for(let i = 0; i < obs.w / 5; i++) {
                            let grassX = obs.x + 2 + (i * 7) + (Math.random() * 3);
                            ctx.fillRect(grassX, obs.y + 2, 2, 3);
                        }
                        
                        // تیغه‌های چمن کوچک در لبه بالایی
                        ctx.fillStyle = '#3A7A2F';
                        for(let i = 0; i < obs.w / 4; i++) {
                            let bladeX = obs.x + 3 + (i * 6) + (Math.random() * 4);
                            ctx.fillRect(bladeX, obs.y - 1, 1, 4);
                            ctx.fillRect(bladeX + 1, obs.y, 1, 3);
                        }
                        
                        // بافت خاک (نقاط تیره)
                        ctx.fillStyle = '#6A4520';
                        for(let i = 0; i < 25; i++) {
                            let dirtX = obs.x + 3 + Math.random() * (obs.w - 6);
                            let dirtY = obs.y + grassHeight + 3 + Math.random() * (obs.h - grassHeight - 6);
                            ctx.fillRect(dirtX, dirtY, 2, 2);
                        }
                        
                        // سنگریزه‌های ریز در خاک
                        ctx.fillStyle = '#A8753A';
                        for(let i = 0; i < 12; i++) {
                            let stoneX = obs.x + 5 + Math.random() * (obs.w - 10);
                            let stoneY = obs.y + grassHeight + 5 + Math.random() * (obs.h - grassHeight - 10);
                            ctx.fillRect(stoneX, stoneY, 2, 2);
                        }
                        
                        // خط مرز بین چمن و خاک (سایه)
                        ctx.fillStyle = '#3A6A2F';
                        ctx.fillRect(obs.x, obs.y + grassHeight - 1, obs.w, 2);
                        
                        // سایه لبه پایینی پلتفرم
                        ctx.fillStyle = '#5A3A1A';
                        ctx.fillRect(obs.x + 2, obs.y + obs.h - 3, obs.w - 4, 3);
                        
                        // برجستگی لبه بالایی (نور)
                        ctx.fillStyle = '#7ACC6A';
                        ctx.fillRect(obs.x + 1, obs.y + 1, obs.w - 2, 2);
                        
                        break;    
                                            
                        
                    case 'pillar':
                        ctx.shadowBlur = 3;
                        
                        // پس زمینه اصلی آجری (قرمز آجری)
                        ctx.fillStyle = '#B84C2C';
                        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                        
                        // الگوی آجرچینی (ردیف‌های افقی با جابجایی)
                        ctx.fillStyle = '#9A3A1A';
                        let rowHeight = 12;
                        let brickWidth = 18;
                        
                        for(let y = obs.y; y < obs.y + obs.h; y += rowHeight) {
                            let isEvenRow = (Math.floor((y - obs.y) / rowHeight) % 2 === 0);
                            let offset = isEvenRow ? 0 : brickWidth / 2;
                            
                            for(let x = obs.x - offset; x < obs.x + obs.w; x += brickWidth) {
                                if(x + brickWidth/2 > obs.x && x < obs.x + obs.w) {
                                    let brickX = Math.max(obs.x, x);
                                    let brickW = Math.min(obs.x + obs.w, x + brickWidth) - brickX;
                                    
                                    // هر آجر جداگانه
                                    ctx.fillStyle = '#B84C2C';
                                    ctx.fillRect(brickX, y, brickW, rowHeight - 2);
                                    ctx.fillStyle = '#9A3A1A';
                                    ctx.fillRect(brickX + 1, y + 1, brickW - 2, rowHeight - 4);
                                    
                                    // خط ملات بین آجرها
                                    ctx.fillStyle = '#D4A88C';
                                    ctx.fillRect(brickX, y + rowHeight - 2, brickW, 2);
                                }
                            }
                        }
                        
                        // خطوط ملات عمودی (با فاصله)
                        ctx.fillStyle = '#D4A88C';
                        for(let y = obs.y; y < obs.y + obs.h; y += rowHeight) {
                            let isEvenRow = (Math.floor((y - obs.y) / rowHeight) % 2 === 0);
                            let offset = isEvenRow ? 0 : brickWidth / 2;
                            
                            for(let x = obs.x + offset; x < obs.x + obs.w; x += brickWidth) {
                                ctx.fillRect(x - 1, y, 2, rowHeight - 2);
                            }
                        }
                        
                        // سایه و برجستگی لبه ستون (گرد کردن گوشه‌ها)
                        ctx.fillStyle = '#D46A3A';
                        ctx.fillRect(obs.x + 1, obs.y + 1, 4, obs.h - 2);
                        ctx.fillRect(obs.x + 1, obs.y + 1, obs.w - 2, 4);
                        
                        // سایه تیره لبه راست و پایین
                        ctx.fillStyle = '#6A2A1A';
                        ctx.fillRect(obs.x + obs.w - 4, obs.y + 2, 3, obs.h - 4);
                        ctx.fillRect(obs.x + 2, obs.y + obs.h - 4, obs.w - 4, 3);
                        
                        // خطوط برجسته عمودی روی ستون (نوارهای تزئینی)
                        ctx.strokeStyle = '#D47040';
                        ctx.lineWidth = 1.5;
                        for(let i = 1; i <= 2; i++) {
                            let lineX = obs.x + (obs.w / 3) * i;
                            ctx.beginPath();
                            ctx.moveTo(lineX, obs.y + 5);
                            ctx.lineTo(lineX, obs.y + obs.h - 5);
                            ctx.stroke();
                        }
                        
                        // ترک‌های تصادفی روی آجرها
                        ctx.fillStyle = '#7A2A1A';
                        if(obs.h > 50) {
                            ctx.fillRect(obs.x + 8, obs.y + 25, 6, 2);
                            ctx.fillRect(obs.x + 15, obs.y + 52, 4, 2);
                            ctx.fillRect(obs.x + 6, obs.y + 85, 5, 2);
                        }
                        
                        break;
                        

                    case 'box':
                        ctx.shadowBlur = 3;
                        ctx.fillStyle = '#C87A3A';
                        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                        ctx.fillStyle = '#8B5A2B';
                        ctx.fillRect(obs.x + 3, obs.y + 3, obs.w - 6, obs.h - 6);
                        ctx.fillStyle = '#FFD699';
                        ctx.fillRect(obs.x + 5, obs.y + 8, obs.w - 10, 3);
                        break;
                        
                    default:
                        ctx.shadowBlur = 3;
                        ctx.fillStyle = '#8B5A2B';
                        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                        ctx.fillStyle = '#5A3A1A';
                        ctx.fillRect(obs.x + 3, obs.y + 3, obs.w - 6, obs.h - 6);
                        break;
                }
            }
            
            
            // حفره قرمز سرتاسر ضلع پایینی
            if(currentPage === TOTAL_PAGES - 1 && TOTAL_PAGES > 0) {
                ctx.fillStyle = '#FF3333DD';
                ctx.shadowBlur = 8;
                ctx.fillRect(0, H - 35, W, 35);
                ctx.fillStyle = '#FF0000';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('🔥 مقصد نهایی 🔥', W/2 - 70, H - 12);
            }
            
            // رسم توپ
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius - 1, 0, Math.PI * 2);
            ctx.fillStyle = '#FFD966';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ball.x - 3, ball.y - 3, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            
            if(!gameActive) {
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#FFAA55';
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 8]);
                ctx.strokeRect(5, H - 25, W - 10, 20);
                ctx.setLineDash([]);
            }
            
            ctx.shadowBlur = 0;
        }
        
        // ========== سنسور گوشی ==========
        function initSensor() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.getElementById('sensorMsg').innerHTML = '📱 iOS detected. Click START to enable sensor.';
                const startBtn = document.getElementById('startBtn');
                const originalClick = startBtn.onclick;
                startBtn.onclick = (e) => {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                sensorActive = true;
                                document.getElementById('sensorMsg').innerHTML = '✅ سنسور فعال شد! گوشی را کج کنید.';
                            }
                        })
                        .catch(err => {
                            console.log(err);
                            document.getElementById('sensorMsg').innerHTML = '⚠️ سنسور در دسترس نیست.';
                        });
                    if(originalClick) originalClick(e);
                };
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                sensorActive = true;
                document.getElementById('sensorMsg').innerHTML = '📱 سنسور فعال - گوشی را کج کنید';
            }
        }
        
        function handleOrientation(event) {
            let gamma = event.gamma;
            let beta = event.beta;
            if(gamma != null && beta != null) {
                tiltX = Math.min(1, Math.max(-1, gamma / 45));
                tiltY = Math.min(1, Math.max(-1, beta / 45));
            }
        }
        
        // ========== شروع بازی ==========
        function startGame() {
            if(!levelData) {
                alert('لطفاً صبر کنید، سطح در حال بارگذاری است...');
                return;
            }
            if(gameActive) return;
            gameActive = true;
            currentPage = 0;
            ball.x = W/2;
            ball.y = H/2;
            ball.vx = 0;
            ball.vy = 0;
            startTime = performance.now();
            document.getElementById('pageNum').innerText = '1';
            document.getElementById('gameState').innerHTML = '🎮 در حال بازی';
        }
        
        // ========== ریست کامل ==========
        function resetGame() {
            gameActive = false;
            currentPage = 0;
            ball.x = W/2;
            ball.y = H/2;
            ball.vx = 0;
            ball.vy = 0;
            tiltX = 0;
            tiltY = 0;
            document.getElementById('pageNum').innerText = '1';
            document.getElementById('timer').innerText = '0.00';
            document.getElementById('gameState').innerHTML = '⏸ آماده';
        }
        
        // ========== اتصال دکمه‌ها ==========
        document.getElementById('startBtn').onclick = startGame;
        document.getElementById('resetBtn').onclick = resetGame;
        
        // ========== حلقه اصلی ==========
        function gameLoop() {
            updatePhysics();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // راه‌اندازی
        initSensor();
        loadLevelFromFile(1);  // بارگذاری واقعی از فایل level1.json
        gameLoop();
    })();
</script>
</body>
</html>
