<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>پینگ پونگ گرانشی - توپ با شیب گوشی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* جلوگیری از اسکرول هنگام بازی */
        }

        .game-container {
            background: #0a1f12;
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #1e3a2f;
            border-radius: 24px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 0 3px #ffd966, 0 0 0 6px #b97f10;
            cursor: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            margin-bottom: 8px;
            color: #ffefb9;
            text-shadow: 2px 2px 0 #5a3e1a;
            padding: 0 8px;
        }

        .speed-box, .tilt-box {
            background: #00000088;
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .controls-note {
            background: #2c2e1eaa;
            text-align: center;
            font-size: 0.7rem;
            padding: 8px;
            border-radius: 28px;
            margin-top: 12px;
            color: #ddd5b6;
        }

        button {
            background: #f4c542;
            border: none;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #2d2b1f;
            margin-top: 6px;
            box-shadow: 0 3px 0 #8b5a2b;
            transition: 0.07s linear;
            font-family: inherit;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b5a2b;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="350" height="550"></canvas>
        <div class="info-panel">
            <div class="speed-box">⚡ سرعت: <span id="speedValue">0.00</span></div>
            <div class="tilt-box">📐 شیب X: <span id="tiltX">0.0</span>° | Y: <span id="tiltY">0.0</span>°</div>
        </div>
        <div class="controls-note">
            🎮 گوشی را کج کنید → توپ به همان سمت غلت می‌خورد و از دیوارها برمی‌گردد 🧠
            <br>
            <button id="resetBtn">🔄 تنظیم مجدد توپ</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- عناصر DOM -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ابعاد منطقی بازی (مستطیل داخل canvas که توپ در آن حرکت می‌کند)
        let width = 350;
        let height = 550;
        canvas.width = width;
        canvas.height = height;

        // ----- پارامترهای توپ (شبیه پینگ پونگ واقعی + جاذبه مصنوعی ناشی از شیب) -----
        let ball = {
            x: width/2,
            y: height/2,
            vx: 0.0,
            vy: 0.0,
            radius: 12      // اندازه توپ
        };

        // ضرایب فیزیکی (حساسیت به شیب گوشی)
        const GRAVITY_FORCE = 0.45;    // شتاب بر حسب پیکسل بر مجذور ثانیه (فریم ریت ~60fps)
        const DAMPING = 0.99;           // کاهش اندک انرژی برای جلوگیری از جنون همیشگی
        const WALL_BOUNCE_DAMP = 0.92;   // ضریب ارتجاعی برخورد با دیوار (کمی غیرکامل برای واقع‌گرایی)
        
        // حداقل و حداکثر سرعت برای تجربه بهتر
        const MAX_SPEED = 14.0;

        // متغیرهای سنسور (شیب گوشی بر حسب درجه یا رادیان - ما از مقدار نرمال شده بین -1 و 1 استفاده می‌کنیم)
        // در واقع شتاب سنج (beta, gamma) را به مولفه جاذبه تبدیل می‌کنیم:
        let tiltX = 0.0;   // شیب چپ/راست (gamma) => شتاب افقی
        let tiltY = 0.0;   // شیب جلو/عقب (beta)  => شتاب عمودی (اما در صفحه ما y جهت پایین)
        
        // آیا سنسور در دسترس است؟
        let sensorAvailable = false;
        let permissionGranted = true; // برای iOS 13+ نیاز به درخواست مجوز داریم
        
        // ----- دستیابی به سنسور DeviceOrientation (برای جاذبه بر اساس زاویه) -----
        function requestOrientationPermission() {
            // برای iOS 13+ : DeviceOrientationEvent.requestPermission
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS نیاز به کلیک کاربر دارد
                const resetBtn = document.getElementById('resetBtn');
                const clickToEnable = () => {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                sensorAvailable = true;
                                document.querySelector('.controls-note').innerHTML += '<br>✅ سنسور فعال شد! گوشی را کج کنید.';
                            } else {
                                document.querySelector('.controls-note').innerHTML += '<br>❌ دسترسی به سنسور رد شد. توپ با موس کار می‌کند.';
                                enableMouseControlFallback();
                            }
                            resetBtn.removeEventListener('click', clickToEnable);
                        })
                        .catch(err => {
                            console.warn(err);
                            enableMouseControlFallback();
                        });
                };
                resetBtn.addEventListener('click', clickToEnable, { once: true });
                document.querySelector('.controls-note').innerHTML = '🎮 برای فعال‌سازی سنسور روی دکمه "تنظیم مجدد" کلیک کنید (iOS) ⚠️';
            } 
            else {
                // اندروید و سایر مرورگرهای معمولی
                window.addEventListener('deviceorientation', handleOrientation);
                sensorAvailable = true;
                document.querySelector('.controls-note').innerHTML += '<br>📱 سنسور فعال - گوشی را بچرخانید.';
            }
        }
        
        // تابع مدیریت داده سنسور (شیب بر حسب درجات)
        function handleOrientation(event) {
            // gamma: چپ به راست (-90 تا 90) => tilt افقی  (سمت راست مثبت)
            // beta: جلو و عقب (-180 تا 180) => tilt عمودی (به سمت پایین مثبت باشه برای جاذبه)
            let gamma = event.gamma;   // چپ/راست
            let beta  = event.beta;    // جلو/عقب
            
            if(gamma == null || beta == null) return;
            
            // نرمال‌سازی به ضریب شتاب بین -1 تا 1 (با حساسیت معقول 45 درجه)
            // اگر گوشی 45 درجه خم شود، شتاب حدود 0.7 برابر جاذبه واقعی
            let normalizedTiltX = Math.min(1, Math.max(-1, gamma / 45));
            let normalizedTiltY = Math.min(1, Math.max(-1, beta / 45));
            
            tiltX = normalizedTiltX;
            tiltY = normalizedTiltY;
            
            // به روز رسانی نمایشگر
            document.getElementById('tiltX').innerText = gamma?.toFixed(1) ?? '0';
            document.getElementById('tiltY').innerText = beta?.toFixed(1) ?? '0';
        }
        
        // ---------- جایگزین ماوس برای کامپیوتر یا زمانی که سنسور در دسترس نیست ----------
        let mouseGravityX = 0, mouseGravityY = 0;
        let useMouseGravity = false;
        
        function enableMouseControlFallback() {
            useMouseGravity = true;
            document.querySelector('.controls-note').innerHTML += '<br>🖱️ حالت موس: ماوس را درون کادر حرکت دهید تا جهت گرانش شبیه‌سازی شود.';
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                let mouseX = (e.clientX - rect.left) * scaleX;
                let mouseY = (e.clientY - rect.top) * scaleX;
                // نقشه برداری به محدوده [-1,1] نسبت به مرکز
                let centerX = width/2;
                let centerY = height/2;
                let rawX = (mouseX - centerX) / (width/2);
                let rawY = (mouseY - centerY) / (height/2);
                mouseGravityX = Math.min(0.9, Math.max(-0.9, rawX));
                mouseGravityY = Math.min(0.9, Math.max(-0.9, rawY));
            });
            canvas.addEventListener('mouseleave', () => {
                mouseGravityX = 0;
                mouseGravityY = 0;
            });
        }
        
        // ----- اعمال شتاب ناشی از جاذبه مجازی (شیب گوشی یا ماوس) -----
        function applyGravity() {
            let gravX = useMouseGravity ? mouseGravityX : tiltX;
            let gravY = useMouseGravity ? mouseGravityY : tiltY;
            
            // شتاب بردار جاذبه در صفحه (ضربدر نیروی ثابت)
            ball.vx += gravX * GRAVITY_FORCE;
            ball.vy += gravY * GRAVITY_FORCE;
            
            // محدودیت حداکثر سرعت برای جلوگیری از خروج از کنترل
            let spd = Math.hypot(ball.vx, ball.vy);
            if(spd > MAX_SPEED) {
                ball.vx = (ball.vx / spd) * MAX_SPEED;
                ball.vy = (ball.vy / spd) * MAX_SPEED;
            }
            
            // اعمال اصطکاک هوای بسیار کم (برای اینکه توپ بی‌نهایت تند نشود)
            ball.vx *= DAMPING;
            ball.vy *= DAMPING;
        }
        
        // ----- برخورد با دیوارها (مکانیک کامل پینگ پونگ، بازتاب الاستیک با کمی کاهش سرعت)-----
        function handleCollisions() {
            let leftBound = ball.radius;
            let rightBound = width - ball.radius;
            let topBound = ball.radius;
            let bottomBound = height - ball.radius;
            
            // برخورد افقی (چپ/راست)
            if(ball.x < leftBound) {
                ball.x = leftBound;
                ball.vx = -ball.vx * WALL_BOUNCE_DAMP;
                // جلوگیری از چسبندگی خفیف
                if(Math.abs(ball.vx) < 0.2) ball.vx = (ball.vx > 0 ? 0.2 : -0.2);
            }
            if(ball.x > rightBound) {
                ball.x = rightBound;
                ball.vx = -ball.vx * WALL_BOUNCE_DAMP;
                if(Math.abs(ball.vx) < 0.2) ball.vx = (ball.vx > 0 ? 0.2 : -0.2);
            }
            
            // برخورد عمودی (بالا/پایین)
            if(ball.y < topBound) {
                ball.y = topBound;
                ball.vy = -ball.vy * WALL_BOUNCE_DAMP;
                if(Math.abs(ball.vy) < 0.2) ball.vy = (ball.vy > 0 ? 0.2 : -0.2);
            }
            if(ball.y > bottomBound) {
                ball.y = bottomBound;
                ball.vy = -ball.vy * WALL_BOUNCE_DAMP;
                if(Math.abs(ball.vy) < 0.2) ball.vy = (ball.vy > 0 ? 0.2 : -0.2);
            }
        }
        
        // ----- به روز رسانی موقعیت بر اساس سرعت و فریم -----
        let lastTimestamp = 0;
        function updatePhysics() {
            // حرکت اویلر ساده (هر فریم یک گام زمانی 1 واحد = فرض بر 60fps)
            // اگر فریم ریت واقعی متفاوت باشد، باز هم تجربه روان باقی می‌ماند، چون نیروها پیوسته‌اند.
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // اعمال گرانش (شیب)
            applyGravity();
            
            // مدیریت برخورد
            handleCollisions();
            
            // نمایش سرعت لحظه‌ای برای شادابی
            let currentSpeed = Math.hypot(ball.vx, ball.vy).toFixed(2);
            document.getElementById('speedValue').innerText = currentSpeed;
        }
        
        // ----- رسم همه چیز با کیفیت و سایه -----
        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // ترسیم خطوط نشان دهنده لبه (افکت پینگ پونگ)
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#ffd966";
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 12]);
            ctx.strokeRect(6, 6, width-12, height-12);
            ctx.setLineDash([]);
            
            // نقطه مرکزی کم رنگ
            ctx.beginPath();
            ctx.arc(width/2, height/2, 8, 0, Math.PI*2);
            ctx.fillStyle = "#ffffff20";
            ctx.fill();
            
            // رسم توپ براق (با سایه و گرادیانت)
            const grad = ctx.createRadialGradient(ball.x-3, ball.y-3, 3, ball.x, ball.y, ball.radius);
            grad.addColorStop(0, '#f9f3c1');
            grad.addColorStop(0.6, '#f5bc70');
            grad.addColorStop(1, '#da7a2c');
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius-1, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.shadowBlur = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius-2, 0, Math.PI*2);
            ctx.fillStyle = "#ffeaac";
            ctx.fill();
            
            // هایلایت سفید کوچک
            ctx.beginPath();
            ctx.arc(ball.x-3, ball.y-3, 3, 0, Math.PI*2);
            ctx.fillStyle = "#ffffffc0";
            ctx.fill();
            ctx.restore();
            
            // نمایش یک خط راهنما در کناره (اثر پینگ پنگ)
            ctx.font = "bold 14px 'Segoe UI'";
            ctx.fillStyle = "#ffeecc";
            ctx.shadowBlur = 0;
            ctx.fillText("⚡", 12, 40);
            ctx.fillText("🎯", width-30, height-20);
        }
        
        // ----- حلقه بازی -----
        let animationId;
        function gameLoop() {
            updatePhysics();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ----- ریست توپ (قرار دادن در مرکز و سرعت صفر) -----
        function resetBall() {
            ball.x = width/2;
            ball.y = height/2;
            ball.vx = 0;
            ball.vy = 0;
            // یک انیمیشن کوچک شبیه سازی
        }
        
        // ----- رزایز هوشمند (در صورت تغییر ابعاد viewport مقیاس canvas دستی)-----
        function handleResize() {
            // حفظ نسبت اصلی، فقط canvas سبک را بهینه می‌کنیم
            let container = document.querySelector('.game-container');
            let maxWidth = Math.min(window.innerWidth - 40, 450);
            canvas.style.width = `${maxWidth}px`;
            canvas.style.height = 'auto';
            // ابعاد منطقی بدون تغییر باقی می‌ماند (350x550) تا فیزیک ثابت بماند
        }
        
        // ----- آغاز به کار -----
        function init() {
            handleResize();
            window.addEventListener('resize', handleResize);
            const resetBtn = document.getElementById('resetBtn');
            resetBtn.addEventListener('click', resetBall);
            
            // درخواست سنسور (سازگار با iOS و اندروید)
            requestOrientationPermission();
            
            // شروع حلقه
            gameLoop();
        }
        
        init();
    })();
</script>
</body>
</html>
