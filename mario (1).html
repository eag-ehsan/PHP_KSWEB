<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سوپر ماریو - نسخه عمودی موبایل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            padding: 10px;
        }

        #gameWrapper {
            background: #000;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            padding: 10px;
            display: inline-block;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            cursor: pointer;
            touch-action: none;
            width: 100%;
            height: auto;
            background: #000;
        }

        #ui {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            margin-top: 10px;
            color: white;
            font-weight: bold;
            backdrop-filter: blur(10px);
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 16px;
        }

        .stat span:first-child {
            font-size: 18px;
        }

        #controls {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            gap: 15px;
        }

        .control-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 60px;
            padding: 12px 20px;
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            touch-action: manipulation;
            min-width: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .control-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.3);
        }

        .dpad {
            display: flex;
            gap: 10px;
        }

        .action-btns {
            display: flex;
            gap: 15px;
        }

        #restartBtn {
            background: #ff4757;
            border: none;
            font-size: 20px;
            padding: 12px 20px;
        }

        @media (max-width: 600px) {
            .control-btn {
                padding: 10px 15px;
                font-size: 20px;
                min-width: 60px;
            }
            
            .stat {
                font-size: 14px;
                padding: 4px 8px;
            }
            
            .stat span:first-child {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<div>
    <div id="gameWrapper">
        <div id="gameContainer">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>
        <div id="ui">
            <div class="stat">
                <span>⭐</span>
                <span id="score">0</span>
            </div>
            <div class="stat">
                <span>❤️</span>
                <span id="lives">3</span>
            </div>
            <div class="stat">
                <span>🪙</span>
                <span id="coins">0</span>
            </div>
            <div class="stat">
                <span>🏆</span>
                <span id="level">1</span>
            </div>
        </div>
        <div id="controls">
            <div class="dpad">
                <div class="control-btn" id="leftBtn">◀</div>
                <div class="control-btn" id="rightBtn">▶</div>
            </div>
            <div class="action-btns">
                <div class="control-btn" id="jumpBtn">⭐</div>
                <div class="control-btn" id="restartBtn">🔄</div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // ========== تنظیمات اندازه برای پورتره ==========
    // سایز ثابت: 400x600 (مناسب موبایل عمودی)
    const GAME_WIDTH = 400;
    const GAME_HEIGHT = 600;
    
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;
    
    // ========== تنظیمات پیشرفته گرافیکی ==========
    let particles = [];
    let screenShake = 0;
    let invincibleFrames = 0;
    let coinsCollected = 0;
    let gameRunning = true;
    
    // ========== بازیکن (مقیاس شده برای صفحه عمودی) ==========
    const player = {
        x: 180,
        y: 500,
        width: 28,
        height: 28,
        velocityY: 0,
        velocityX: 0,
        isJumping: false,
        facingRight: true,
        grounded: false,
        color: '#E52525'
    };
    
    // ========== سکوها (مناسب صفحه عمودی) ==========
    let platforms = [
        { x: 0, y: 560, width: 400, height: 40, type: 'ground' },
        { x: 50, y: 500, width: 80, height: 15, type: 'brick', color: '#CD853F' },
        { x: 180, y: 460, width: 80, height: 15, type: 'brick', color: '#CD853F' },
        { x: 300, y: 420, width: 70, height: 15, type: 'brick', color: '#CD853F' },
        { x: 80, y: 370, width: 70, height: 15, type: 'cloud', color: '#ECF0F1' },
        { x: 250, y: 320, width: 70, height: 15, type: 'cloud', color: '#ECF0F1' },
        { x: 150, y: 270, width: 60, height: 15, type: 'magic', color: '#FFD700' }
    ];
    
    // ========== سکه‌ها ==========
    let coins = [
        { x: 90, y: 480, width: 12, height: 12, collected: false, sparkle: 0 },
        { x: 220, y: 440, width: 12, height: 12, collected: false, sparkle: 0 },
        { x: 335, y: 400, width: 12, height: 12, collected: false, sparkle: 0 },
        { x: 115, y: 350, width: 12, height: 12, collected: false, sparkle: 0 },
        { x: 285, y: 300, width: 12, height: 12, collected: false, sparkle: 0 },
        { x: 180, y: 250, width: 12, height: 12, collected: false, sparkle: 0 }
    ];
    
    // ========== دشمنان ==========
    let enemies = [
        { x: 100, y: 535, width: 25, height: 25, velocityX: 0.8, type: 'goomba' },
        { x: 230, y: 435, width: 25, height: 25, velocityX: -0.7, type: 'goomba' },
        { x: 330, y: 395, width: 25, height: 25, velocityX: 0.6, type: 'goomba' }
    ];
    
    // ========== فیزیک ==========
    const gravity = 0.7;
    const jumpPower = -9.5;
    const moveSpeed = 3.8;
    const friction = 0.92;
    
    // ========== امتیازات ==========
    let score = 0;
    let lives = 3;
    let level = 1;
    
    // ========== کنترل لمسی ==========
    let touchLeft = false;
    let touchRight = false;
    let touchJump = false;
    
    document.getElementById('leftBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        touchLeft = true;
    });
    document.getElementById('leftBtn').addEventListener('touchend', () => { touchLeft = false; });
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        touchRight = true;
    });
    document.getElementById('rightBtn').addEventListener('touchend', () => { touchRight = false; });
    document.getElementById('jumpBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        touchJump = true;
    });
    document.getElementById('jumpBtn').addEventListener('touchend', () => { touchJump = false; });
    document.getElementById('restartBtn').addEventListener('click', () => resetGame());
    
    // ========== سیستم ذرات ==========
    function addParticles(x, y, color, count = 5) {
        for(let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y, vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4 - 2,
                life: 1, color: color, size: Math.random() * 3 + 2
            });
        }
    }
    
    // ========== بروزرسانی بازیکن ==========
    function updatePlayer() {
        if (touchLeft) {
            player.velocityX = -moveSpeed;
            player.facingRight = false;
        } else if (touchRight) {
            player.velocityX = moveSpeed;
            player.facingRight = true;
        } else {
            player.velocityX *= friction;
        }
        
        if (touchJump && player.grounded) {
            player.velocityY = jumpPower;
            player.isJumping = true;
            player.grounded = false;
            addParticles(player.x + player.width/2, player.y + player.height, '#FFD700', 6);
            touchJump = false;
        }
        
        player.velocityY += gravity;
        player.x += player.velocityX;
        player.y += player.velocityY;
        
        player.grounded = false;
        for (let platform of platforms) {
            if (player.velocityY >= 0 &&
                player.x + player.width > platform.x &&
                player.x < platform.x + platform.width &&
                player.y + player.height > platform.y &&
                player.y + player.height < platform.y + platform.height + 15) {
                
                player.y = platform.y - player.height;
                player.velocityY = 0;
                player.grounded = true;
            }
        }
        
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > GAME_WIDTH) player.x = GAME_WIDTH - player.width;
        if (player.y + player.height > GAME_HEIGHT) hit();
        if (player.y < 0) player.y = 0;
        
        if (invincibleFrames > 0) invincibleFrames--;
    }
    
    // ========== بروزرسانی سکه‌ها ==========
    function updateCoins() {
        for (let i = 0; i < coins.length; i++) {
            if (!coins[i].collected) {
                if (player.x < coins[i].x + coins[i].width &&
                    player.x + player.width > coins[i].x &&
                    player.y < coins[i].y + coins[i].height &&
                    player.y + player.height > coins[i].y) {
                    
                    coins[i].collected = true;
                    score += 10;
                    coinsCollected++;
                    document.getElementById('score').innerText = score;
                    document.getElementById('coins').innerText = coinsCollected;
                    addParticles(coins[i].x + coins[i].width/2, coins[i].y + coins[i].height/2, '#FFD700', 8);
                    
                    if (coinsCollected >= coins.length) levelUp();
                }
            }
            coins[i].sparkle = (coins[i].sparkle + 0.05) % (Math.PI * 2);
        }
    }
    
    // ========== بروزرسانی دشمنان ==========
    function updateEnemies() {
        for (let i = 0; i < enemies.length; i++) {
            const enemy = enemies[i];
            enemy.x += enemy.velocityX;
            
            if (enemy.x < 30 || enemy.x + enemy.width > GAME_WIDTH - 30) {
                enemy.velocityX *= -1;
            }
            
            if (player.velocityY > 0 &&
                player.x + player.width > enemy.x &&
                player.x < enemy.x + enemy.width &&
                player.y + player.height > enemy.y &&
                player.y + player.height < enemy.y + enemy.height + 10) {
                
                enemies.splice(i, 1);
                score += 20;
                document.getElementById('score').innerText = score;
                addParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#FF0000', 12);
                i--;
                continue;
            }
            
            if (invincibleFrames === 0 &&
                player.x + player.width > enemy.x &&
                player.x < enemy.x + enemy.width &&
                player.y + player.height > enemy.y &&
                player.y < enemy.y + enemy.height) {
                hit();
            }
        }
    }
    
    // ========== آسیب دیدن ==========
    function hit() {
        if (!gameRunning || invincibleFrames > 0) return;
        
        lives--;
        document.getElementById('lives').innerText = lives;
        screenShake = 8;
        invincibleFrames = 50;
        
        addParticles(player.x + player.width/2, player.y + player.height/2, '#FF0000', 15);
        
        if (lives <= 0) {
            gameOver();
        } else {
            player.x = 180;
            player.y = 500;
            player.velocityX = 0;
            player.velocityY = 0;
        }
    }
    
    // ========== افزایش مرحله ==========
    function levelUp() {
        level++;
        document.getElementById('level').innerText = level;
        coinsCollected = 0;
        document.getElementById('coins').innerText = '0';
        
        enemies.forEach(enemy => enemy.velocityX *= 1.2);
        coins.forEach(coin => coin.collected = false);
        
        if (level % 2 === 0 && lives < 5) {
            lives++;
            document.getElementById('lives').innerText = lives;
        }
    }
    
    // ========== پایان بازی ==========
    function gameOver() {
        gameRunning = false;
        setTimeout(() => {
            if(confirm(`🎮 بازی تمام شد!\nامتیاز: ${score}\nمرحله: ${level}\nآیا دوباره بازی می‌کنید؟`)) {
                resetGame();
            }
        }, 100);
    }
    
    // ========== ریست بازی ==========
    function resetGame() {
        score = 0;
        lives = 3;
        level = 1;
        coinsCollected = 0;
        gameRunning = true;
        player.x = 180;
        player.y = 500;
        player.velocityX = 0;
        player.velocityY = 0;
        
        enemies = [
            { x: 100, y: 535, width: 25, height: 25, velocityX: 0.8, type: 'goomba' },
            { x: 230, y: 435, width: 25, height: 25, velocityX: -0.7, type: 'goomba' },
            { x: 330, y: 395, width: 25, height: 25, velocityX: 0.6, type: 'goomba' }
        ];
        
        coins.forEach(coin => coin.collected = false);
        particles = [];
        
        document.getElementById('score').innerText = '0';
        document.getElementById('lives').innerText = '3';
        document.getElementById('level').innerText = '1';
        document.getElementById('coins').innerText = '0';
    }
    
    // ========== طراحی گرافیکی ==========
    function draw() {
        ctx.save();
        if (screenShake > 0) {
            ctx.translate(Math.random() * 3 - 1.5, Math.random() * 3 - 1.5);
            screenShake--;
        }
        
        // آسمان گرادینت
        let gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
        gradient.addColorStop(0, '#1a1a2e');
        gradient.addColorStop(0.5, '#16213e');
        gradient.addColorStop(1, '#0f3460');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        
        // ستاره‌ها
        for(let i = 0; i < 40; i++) {
            ctx.fillStyle = `rgba(255,255,255,${Math.sin(Date.now() * 0.002 + i) * 0.3 + 0.3})`;
            ctx.fillRect((i * 131) % GAME_WIDTH, (i * 57) % 100, 2, 2);
        }
        
        // سکوها
        for (let platform of platforms) {
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.fillStyle = platform.color || (platform.type === 'cloud' ? '#ECF0F1' : '#8B4513');
            ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
            
            if (platform.type === 'brick') {
                ctx.fillStyle = '#A0522D';
                for(let i = 0; i < 3; i++) {
                    if(platform.x + 15 + i*25 < platform.x + platform.width) {
                        ctx.fillRect(platform.x + 15 + i*25, platform.y - 3, 6, 4);
                    }
                }
            }
            if (platform.type === 'magic') {
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(platform.x, platform.y - 3, platform.width, 3);
            }
        }
        
        // سکه‌ها
        for (let coin of coins) {
            if (!coin.collected) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#FFD700';
                let glow = 50 + Math.sin(coin.sparkle) * 20;
                ctx.fillStyle = `hsl(50, 100%, ${glow}%)`;
                ctx.beginPath();
                ctx.arc(coin.x + coin.width/2, coin.y + coin.height/2 + Math.sin(Date.now() * 0.008 + coin.x) * 1.5, coin.width/1.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.arc(coin.x + coin.width/2, coin.y + coin.height/2, coin.width/2.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // دشمنان
        for (let enemy of enemies) {
            ctx.fillStyle = '#6B3E1F';
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            ctx.fillStyle = '#3E2723';
            ctx.fillRect(enemy.x + 6, enemy.y + 6, 5, 5);
            ctx.fillRect(enemy.x + 14, enemy.y + 6, 5, 5);
            ctx.fillStyle = '#fff';
            ctx.fillRect(enemy.x + 8, enemy.y + 15, 3, 2);
            ctx.fillRect(enemy.x + 16, enemy.y + 15, 3, 2);
        }
        
        // بازیکن ماریو
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#FFD700';
        if (invincibleFrames > 0 && Math.floor(Date.now() / 80) % 2 === 0) {
            ctx.globalAlpha = 0.5;
        }
        
        ctx.fillStyle = '#E52525';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = '#FF4444';
        ctx.fillRect(player.x + 4, player.y - 6, player.width - 8, 9);
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(player.x + 8, player.y - 4, 4, 4);
        ctx.fillRect(player.x + 18, player.y - 4, 4, 4);
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(player.x + 10, player.y + 12, 10, 6);
        ctx.fillStyle = '#2C3E50';
        ctx.fillRect(player.x + 6, player.y + 6, 4, 4);
        ctx.fillRect(player.x + 20, player.y + 6, 4, 4);
        
        ctx.globalAlpha = 1;
        
        // ذرات
        for(let i = 0; i < particles.length; i++) {
            let p = particles[i];
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if(p.life <= 0) particles.splice(i,1);
        }
        
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        ctx.restore();
    }
    
    // ========== حلقه اصلی ==========
    function gameLoop() {
        if (gameRunning) {
            updatePlayer();
            updateCoins();
            updateEnemies();
        }
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // شروع بازی
    gameLoop();
</script>
</body>
</html>
